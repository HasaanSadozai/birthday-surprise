<script>

// INTRO AUTO START
setTimeout(() => {
  let intro = document.getElementById("intro");
  let q1 = document.getElementById("q1");

  if(intro) intro.style.display = "none";
  if(q1) q1.classList.remove("hidden");
}, 2000);


// NEXT
function next(step){
  document.querySelectorAll("div[id^='q']").forEach(q=>q.classList.add("hidden"));

  let nextQ = document.getElementById("q"+step);
  if(nextQ) nextQ.classList.remove("hidden");
}


// MESSAGE (SAFE VERSION)
function showMessage(){

  let q6 = document.getElementById("q6");
  if(q6) q6.classList.add("hidden");

  // sound
  try{
    let audio = new Audio("https://www.myinstants.com/media/sounds/windows-error.mp3");
    audio.play();
  }catch(e){}

  // vibration
  if(navigator.vibrate){
    navigator.vibrate([200,100,200,100,400]);
  }

  // fake screen
  let fake = document.createElement("div");
  fake.style.position="fixed";
  fake.style.top="0";
  fake.style.left="0";
  fake.style.width="100%";
  fake.style.height="100%";
  fake.style.background="black";
  fake.style.color="red";
  fake.style.display="flex";
  fake.style.justifyContent="center";
  fake.style.alignItems="center";
  fake.style.fontSize="40px";
  fake.innerHTML="⚠️ VIRUS DETECTED ⚠️";
  document.body.appendChild(fake);

  setTimeout(()=>{
    fake.remove();

    let msg = document.getElementById("msg");
    if(msg) msg.classList.remove("hidden");

    setTimeout(()=>{
      if(msg) msg.classList.add("hidden");
      showFinal();
    },3000);

  },2000);
}


// FINAL
function showFinal(){

  let final = document.getElementById("final");
  let music = document.getElementById("music");

  if(final) final.classList.remove("hidden");

  if(music){
    music.play().catch(()=>{});
  }

  // balloons
  setInterval(()=>{
    let b=document.createElement("div");
    b.className="balloon";
    b.innerHTML="🎈";
    b.style.left=Math.random()*100+"vw";
    document.body.appendChild(b);
  },300);

  // confetti
  setInterval(()=>{
    let c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.style.background=`hsl(${Math.random()*360},70%,60%)`;
    document.body.appendChild(c);
  },150);
}


// MOVE FUNCTION (SAFE)
function move(btn){
  if(!btn) return;

  btn.addEventListener("mouseover", ()=>{
    btn.style.position="absolute";
    btn.style.left=Math.random()*(window.innerWidth-100)+"px";
    btn.style.top=Math.random()*(window.innerHeight-50)+"px";
  });
}


// WAIT FOR DOM (IMPORTANT FIX)
window.onload = function(){

  // NO buttons
  ["no1","no2","no3","no4","no6"].forEach(id=>{
    let el = document.getElementById(id);
    if(el) move(el);
  });

  // YES5 move
  let yes5 = document.getElementById("yes5");
  if(yes5){
    yes5.addEventListener("mouseover", ()=>{
      yes5.style.position="absolute";
      yes5.style.left=Math.random()*(window.innerWidth-100)+"px";
      yes5.style.top=Math.random()*(window.innerHeight-50)+"px";
    });
  }

};

</script>
