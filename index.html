<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prank 😈</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:black;
  color:white;
  text-align:center;
  overflow:hidden;
}

.hidden { display:none; }

button {
  padding:12px 20px;
  font-size:18px;
  margin:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  position:relative;
}

#final {
  font-size:40px;
  margin-top:20%;
}

/* balloons */
.balloon {
  position: fixed;
  bottom:-50px;
  font-size:30px;
  animation: float 6s linear infinite;
}

@keyframes float {
  from { transform:translateY(0); }
  to { transform:translateY(-120vh); }
}

/* confetti */
.confetti {
  position: fixed;
  width:10px;
  height:10px;
  animation: fall 3s linear infinite;
}

@keyframes fall {
  from { transform:translateY(-10vh); }
  to { transform:translateY(110vh); }
}
</style>
</head>

<body>

<audio id="music" src="https://www.myinstants.com/media/sounds/happy-birthday.mp3"></audio>

<!-- Q1 -->
<div id="q1">
<h2>Question 1</h2>
<p>Agar tum gay ho to YES click karo</p>
<button onclick="next(2)">YES</button>
<button id="no1">NO</button>
</div>

<!-- Q2 -->
<div id="q2" class="hidden">
<h2>Question 2</h2>
<p> Tum kawaray maroge? 😈</p>
<button onclick="showMessage()">YES</button>
<button id="no2">NO</button>
</div>

<!-- MESSAGE -->
<div id="msg" class="hidden">
<h1>Tum kawaray hi maroge 😂</h1>
</div>

<!-- FINAL -->
<div id="final" class="hidden">
<h1>🎉 Happy Birthday To You 🎂</h1>
<h2>Ashir Khan Sadozai 🎉</h2>
</div>

<script>

// next step
function next(step){
  document.getElementById("q1").classList.add("hidden");
  document.getElementById("q2").classList.remove("hidden");
}

// prank message
function showMessage(){
  document.getElementById("q2").classList.add("hidden");
  document.getElementById("msg").classList.remove("hidden");

  setTimeout(()=>{
    document.getElementById("msg").classList.add("hidden");
    showFinal();
  },3000);
}

// final screen
function showFinal(){
  document.getElementById("final").classList.remove("hidden");

  // music
  document.getElementById("music").play();

  // balloons
  setInterval(()=>{
    let b=document.createElement("div");
    b.className="balloon";
    b.innerHTML="🎈";
    b.style.left=Math.random()*100+"vw";
    document.body.appendChild(b);
  },300);

  // confetti
  setInterval(()=>{
    let c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.style.background=`hsl(${Math.random()*360},70%,60%)`;
    document.body.appendChild(c);
  },150);
}

// NO button bhagega
function move(btn){
  btn.addEventListener("mouseover", ()=>{
    btn.style.position="absolute";
    btn.style.left=Math.random()*(window.innerWidth-100)+"px";
    btn.style.top=Math.random()*(window.innerHeight-50)+"px";
  });
}

move(document.getElementById("no1"));
move(document.getElementById("no2"));

</script>

</body>
</html>
