<!DOCTYPE html>
<html>
<head>
<title>Birthday Surprise</title>
<style>
body {
  margin: 0;
  padding: 0;
  text-align: center;
  background: black;
  color: white;
  font-family: Arial;
  overflow: hidden;
}

.container {
  margin-top: 100px;
}

button {
  padding: 12px 25px;
  font-size: 18px;
  margin: 10px;
  cursor: pointer;
  border-radius: 10px;
  border: none;
}

.hidden {
  display: none;
}

#final {
  font-size: 40px;
  color: pink;
  margin-top: 100px;
}

/* Balloons */
.balloon {
  position: absolute;
  bottom: -100px;
  font-size: 30px;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  0% {transform: translateY(0);}
  100% {transform: translateY(-120vh);}
}
</style>
</head>

<body>

<div class="container" id="quiz">
  <h2 id="q1">Question 1</h2>
  <button onclick="next(1)">Yes</button>
  <button onclick="next(1)">No</button>

  <h2 id="q2" class="hidden">Question 2</h2>
  <button class="hidden" onclick="next(2)">Yes</button>
  <button class="hidden" onclick="next(2)">No</button>

  <h2 id="q3" class="hidden">Question 3</h2>
  <button class="hidden" onclick="next(3)">Yes</button>
  <button class="hidden" onclick="next(3)">No</button>

  <h2 id="q4" class="hidden">Question 4</h2>
  <button class="hidden" onclick="finish()">✔</button>
</div>

<div id="final" class="hidden">
  🎉 HAPPY BIRTHDAY TO YOU 🎂<br>
  Hasaan Sadozai
</div>

<script>
function next(n) {
  document.getElementById("q"+(n+1)).classList.remove("hidden");

  let buttons = document.querySelectorAll("button");
  buttons.forEach(btn => btn.classList.add("hidden"));

  let newBtns = document.querySelectorAll("#q"+(n+1)+" ~ button");
  newBtns.forEach(btn => btn.classList.remove("hidden"));
}

function finish() {
  document.getElementById("quiz").style.display = "none";
  document.getElementById("final").classList.remove("hidden");

  // balloons start
  setInterval(createBalloon, 500);
}

function createBalloon() {
  let balloon = document.createElement("div");
  balloon.className = "balloon";
  balloon.innerHTML = "🎈";
  balloon.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(balloon);

  setTimeout(() => {
    balloon.remove();
  }, 6000);
}
</script>

</body>
</html>
