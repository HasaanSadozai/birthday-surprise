<script>

// INTRO AUTO START
setTimeout(() => {
  document.getElementById("intro").style.display = "none";
  document.getElementById("q1").classList.remove("hidden");
}, 2000);

// NEXT
function next(step){
  document.querySelectorAll("div[id^='q']").forEach(q=>q.classList.add("hidden"));
  document.getElementById("q"+step).classList.remove("hidden");
}

// MESSAGE (UPGRADED)
function showMessage(){

  // Q6 hide
  document.getElementById("q6").classList.add("hidden");

  // 🔊 LOUD SOUND
  let audio = new Audio("https://www.myinstants.com/media/sounds/windows-error.mp3");
  audio.play().catch(()=>{});

  // 📳 VIBRATION (mobile)
  if(navigator.vibrate){
    navigator.vibrate([200,100,200,100,400]);
  }

  // ⚠️ FAKE VIRUS SCREEN
  let fake = document.createElement("div");
  fake.style.position="fixed";
  fake.style.top="0";
  fake.style.left="0";
  fake.style.width="100%";
  fake.style.height="100%";
  fake.style.background="black";
  fake.style.color="red";
  fake.style.display="flex";
  fake.style.justifyContent="center";
  fake.style.alignItems="center";
  fake.style.fontSize="40px";
  fake.innerHTML="⚠️ VIRUS DETECTED ⚠️";
  document.body.appendChild(fake);

  // 2 sec baad normal message
  setTimeout(()=>{
    fake.remove();

    document.getElementById("msg").classList.remove("hidden");

    setTimeout(()=>{
      document.getElementById("msg").classList.add("hidden");
      showFinal();
    },3000);

  },2000);
}

// FINAL
function showFinal(){
  document.getElementById("final").classList.remove("hidden");
  document.getElementById("music").play();

  setInterval(()=>{
    let b=document.createElement("div");
    b.className="balloon";
    b.innerHTML="🎈";
    b.style.left=Math.random()*100+"vw";
    document.body.appendChild(b);
  },300);

  setInterval(()=>{
    let c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.style.background=`hsl(${Math.random()*360},70%,60%)`;
    document.body.appendChild(c);
  },150);
}

// NO BUTTON MOVE
function move(btn){
  btn.addEventListener("mouseover", ()=>{
    btn.style.position="absolute";
    btn.style.left=Math.random()*(window.innerWidth-100)+"px";
    btn.style.top=Math.random()*(window.innerHeight-50)+"px";
  });
}

// YES5 MOVE
setTimeout(()=>{
  let yes5 = document.getElementById("yes5");
  if(yes5){
    yes5.addEventListener("mouseover", ()=>{
      yes5.style.position="absolute";
      yes5.style.left=Math.random()*(window.innerWidth-100)+"px";
      yes5.style.top=Math.random()*(window.innerHeight-50)+"px";
    });
  }
},500);

// no buttons
["no1","no2","no3","no4","no6"].forEach(id=>{
  move(document.getElementById(id));
});

</script>
